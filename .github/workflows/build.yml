name: Build and Test

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DesktopAutomationHelper.slnx

      - name: Build solution
        run: dotnet build DesktopAutomationHelper.slnx --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test
          src/DesktopAutomationDriver.Tests/DesktopAutomationDriver.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=TestResults.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  publish-exe:
    name: Publish Standalone EXE (Windows)
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file EXE
        run: >
          dotnet publish
          src/DesktopAutomationDriver/DesktopAutomationDriver.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopAutomationDriver-win-x64
          path: ./publish/DesktopAutomationDriver.exe
