name: Release

on:
  push:
    branches: [ main, master ]

jobs:
  release:
    name: Build and Release EXE
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create tags and releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DesktopAutomationHelper.slnx

      - name: Publish single-file EXE
        run: >
          dotnet publish
          src/DesktopAutomationDriver/DesktopAutomationDriver.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Compute release version
        id: version
        shell: bash
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Desktop Automation Driver ${{ steps.version.outputs.tag }}"
          body: |
            Automated release built from commit ${{ github.sha }}.

            **How to use:**
            Download `DesktopAutomationDriver.exe`, place it anywhere and run it directly — no installation required.
          files: ./publish/DesktopAutomationDriver.exe
          generate_release_notes: true
